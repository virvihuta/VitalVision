services:
  - type: web
    name: vitalvision-api
    runtime: python
    plan: free
    rootDir: backend
    autoDeploy: true
    # CPU-only torch wheel keeps the image small enough for Render's free plan.
    buildCommand: |
      pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
      pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
